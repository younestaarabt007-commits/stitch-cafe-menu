<!DOCTYPE html>
<html class="light" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Customize Brunch — Stitch Café</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#f2930d",
            "background-light": "#fffcf2",
            "background-dark": "#1a1c18"
          },
          fontFamily: {
            display: ["Plus Jakarta Sans", "sans-serif"]
          }
        }
      }
    };
  </script>
</head>

<body class="bg-background-light dark:bg-background-dark text-[#1a1c18] dark:text-white antialiased">
  <div
    class="relative min-h-screen w-full max-w-[390px] mx-auto flex flex-col bg-background-light dark:bg-background-dark overflow-x-hidden shadow-2xl">
    <header
      class="absolute top-0 left-0 right-0 z-20 flex items-center justify-between p-4 bg-gradient-to-b from-black/30 to-transparent">
      <button id="back-btn"
        class="flex size-9 items-center justify-center rounded-full bg-white/25 backdrop-blur-md text-white shadow-sm active:scale-95">
        <span class="material-symbols-outlined text-[20px]">arrow_back</span>
      </button>
      <button id="favorite-btn"
        class="flex size-9 items-center justify-center rounded-full bg-white/25 backdrop-blur-md text-white shadow-sm active:scale-95">
        <span class="material-symbols-outlined text-[20px]">bookmark</span>
      </button>
    </header>

    <div class="relative h-[300px] w-full overflow-hidden brunch-cust-hero flex items-end justify-center pb-6 shrink-0">
      <div class="relative z-10 flex flex-col items-center text-center px-6">
        <h1 id="product-title" class="text-white text-[24px] font-extrabold tracking-tight leading-tight">Chef's Brunch
        </h1>
        <p class="text-white/85 text-[12px] font-medium mt-1">Choose egg style, toast type, extras</p>
      </div>
    </div>

    <div class="relative -mt-16 flex-1 bg-white dark:bg-[#1c130d] rounded-t-xl px-4 pt-2">
      <div class="flex h-5 w-full items-center justify-center mb-2">
        <div class="h-1.5 w-12 rounded-full bg-[#e8d9ce] dark:bg-zinc-700"></div>
      </div>
      <div class="flex flex-col gap-1 mb-6">
        <h1 class="text-[#1c130d] dark:text-white text-hero font-bold leading-tight tracking-tight">Chef's Brunch</h1>
        <div class="flex items-center gap-2">
          <div class="flex items-center">
            <span class="material-symbols-outlined text-primary text-lg" style="font-variation-settings: 'FILL' 1">star</span>
            <span class="text-[#1c130d] dark:text-white text-base font-bold ml-1">4.8</span>
          </div>
          <span class="text-[#9c6c49] dark:text-zinc-400 text-sm">(85+ reviews)</span>
        </div>
        <p class="text-[#1c130d]/70 dark:text-zinc-400 text-base font-normal leading-relaxed mt-2">
          Choose egg style, toast type, extras.
        </p>
      </div>

      <div class="mb-6">
        <h2 class="text-[#1c130d] dark:text-white text-section font-bold mb-4">Egg Style</h2>
        <div class="grid grid-cols-2 gap-4">
          <button data-eggs="poached"
            class="group relative p-4 rounded-[20px] border-2 border-primary bg-primary/5 dark:bg-primary/10 flex flex-col gap-1 cursor-pointer chip-active">
            <p class="font-bold text-product text-[#1c130d] dark:text-white">Poached</p>
            <p class="text-sm text-[#9c6c49] dark:text-zinc-400">Classic brunch</p>
          </button>
          <button data-eggs="scrambled"
            class="group relative p-4 rounded-[20px] border border-[#e8d9ce] dark:border-zinc-800 bg-white dark:bg-zinc-900/50 flex flex-col gap-1 cursor-pointer">
            <p class="font-bold text-product text-[#1c130d] dark:text-white">Scrambled</p>
            <p class="text-sm text-[#9c6c49] dark:text-zinc-400">Soft &amp; creamy</p>
          </button>
          <button data-eggs="sunny"
            class="group relative p-4 rounded-[20px] border border-[#e8d9ce] dark:border-zinc-800 bg-white dark:bg-zinc-900/50 flex flex-col gap-1 cursor-pointer">
            <p class="font-bold text-product text-[#1c130d] dark:text-white">Sunny</p>
            <p class="text-sm text-[#9c6c49] dark:text-zinc-400">Sunny side up</p>
          </button>
          <button data-eggs="omelette"
            class="group relative p-4 rounded-[20px] border border-[#e8d9ce] dark:border-zinc-800 bg-white dark:bg-zinc-900/50 flex flex-col gap-1 cursor-pointer">
            <p class="font-bold text-product text-[#1c130d] dark:text-white">Omelette</p>
            <p class="text-sm text-[#9c6c49] dark:text-zinc-400">Fluffy folded</p>
          </button>
        </div>
      </div>

      <div class="mb-6">
        <h2 class="text-[#1c130d] dark:text-white text-section font-bold mb-4">Toast Type</h2>
        <div class="grid grid-cols-3 gap-4">
          <button data-toast="sourdough"
            class="group relative p-4 rounded-[20px] border-2 border-primary bg-primary/5 dark:bg-primary/10 flex flex-col gap-1 cursor-pointer chip-active">
            <p class="font-bold text-product text-[#1c130d] dark:text-white">Sourdough</p>
          </button>
          <button data-toast="multigrain"
            class="group relative p-4 rounded-[20px] border border-[#e8d9ce] dark:border-zinc-800 bg-white dark:bg-zinc-900/50 flex flex-col gap-1 cursor-pointer">
            <p class="font-bold text-product text-[#1c130d] dark:text-white">Multigrain</p>
          </button>
          <button data-toast="brioche"
            class="group relative p-4 rounded-[20px] border border-[#e8d9ce] dark:border-zinc-800 bg-white dark:bg-zinc-900/50 flex flex-col gap-1 cursor-pointer">
            <p class="font-bold text-product text-[#1c130d] dark:text-white">Brioche</p>
          </button>
        </div>
      </div>

      <div class="mb-6">
        <h2 class="text-[#1c130d] dark:text-white text-section font-bold mb-4">Extras</h2>
        <div class="flex flex-col gap-3">
          <button data-extra="avocado" data-price="2.00"
            class="flex items-center justify-between p-3 rounded-lg border border-[#e8d9ce] dark:border-zinc-800 bg-white dark:bg-zinc-900/50">
            <span class="font-bold text-product text-[#1c130d] dark:text-white">Avocado</span>
            <span class="text-xs text-primary font-bold">+2.00DH</span>
          </button>
          <button data-extra="salmon" data-price="4.00"
            class="flex items-center justify-between p-3 rounded-lg border border-[#e8d9ce] dark:border-zinc-800 bg-white dark:bg-zinc-900/50">
            <span class="font-bold text-product text-[#1c130d] dark:text-white">Smoked Salmon</span>
            <span class="text-xs text-primary font-bold">+4.00DH</span>
          </button>
          <button data-extra="feta" data-price="1.50"
            class="flex items-center justify-between p-3 rounded-lg border border-[#e8d9ce] dark:border-zinc-800 bg-white dark:bg-zinc-900/50">
            <span class="font-bold text-product text-[#1c130d] dark:text-white">Feta</span>
            <span class="text-xs text-primary font-bold">+1.50DH</span>
          </button>
        </div>
      </div>

      <div class="mb-4">
        <h2 class="text-[#1c130d] dark:text-white text-section font-bold mb-4">Spice Level</h2>
        <div class="grid grid-cols-3 gap-4">
          <button data-spice="none"
            class="group relative p-3 rounded-[20px] border-2 border-primary bg-primary/5 dark:bg-primary/10 flex flex-col items-center gap-1 cursor-pointer chip-active">
            <span class="font-bold text-product text-[#1c130d] dark:text-white">None</span>
          </button>
          <button data-spice="mild"
            class="group relative p-3 rounded-[20px] border border-[#e8d9ce] dark:border-zinc-800 bg-white dark:bg-zinc-900/50 flex flex-col items-center gap-1 cursor-pointer">
            <span class="font-bold text-product text-[#1c130d] dark:text-white">Mild</span>
          </button>
          <button data-spice="hot"
            class="group relative p-3 rounded-[20px] border border-[#e8d9ce] dark:border-zinc-800 bg-white dark:bg-zinc-900/50 flex flex-col items-center gap-1 cursor-pointer">
            <span class="font-bold text-product text-[#1c130d] dark:text-white">Hot</span>
          </button>
        </div>
      </div>

      <div
        class="mt-6 mb-8 w-full bg-white/95 dark:bg-[#1c130d]/95 backdrop-blur-xl border-t border-[#e8d9ce] dark:border-zinc-800 px-4 py-3">
        <div class="flex flex-col gap-2">
          <div class="flex items-center gap-4">
            <div
              class="flex items-center bg-background-light dark:bg-zinc-900 rounded-full px-2 h-12 border border-[#e8d9ce] dark:border-zinc-800">
              <button
                id="dec-qty"
                class="w-8 h-8 rounded-full flex items-center justify-center text-[#1c130d] dark:text-white hover:bg-zinc-200 dark:hover:bg-zinc-700">
                <span class="material-symbols-outlined text-lg">remove</span>
              </button>
              <span id="qty" class="w-6 text-center font-bold text-base">1</span>
              <button
                id="inc-qty"
                class="w-8 h-8 rounded-full flex items-center justify-center text-[#1c130d] dark:text-white hover:bg-zinc-200 dark:hover:bg-zinc-700">
                <span class="material-symbols-outlined text-lg">add</span>
              </button>
            </div>
            <button
              id="add-btn"
              class="flex-1 h-12 bg-primary hover:bg-primary/90 text-white rounded-full flex items-center justify-center gap-2 shadow-[0_8px_30px_rgb(244,123,37,0.3)] transition-transform active:scale-95">
              <span class="font-bold text-base tracking-wide uppercase">Add to Order</span>
              <span class="w-1 h-1 rounded-full bg-white/50"></span>
              <span id="total-price" class="font-extrabold text-base">12.00DH</span>
            </button>
          </div>
          <div class="flex items-center justify-between text-xs text-[#9c6c49] dark:text-zinc-400 px-1">
            <span class="font-bold uppercase tracking-wide">Summary</span>
            <span id="summary-text" class="font-medium text-right">Poached • Sourdough • None</span>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
  <script src="../nav-bar.js?v=9"></script>
</body>

</html>
