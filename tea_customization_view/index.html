<!DOCTYPE html>
<html class="light" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Customize Tea — Stitch Café</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#f2930d",
            "background-light": "#fafaf5",
            "background-dark": "#1a1c18",
            "zen-green": "#4a5d4e"
          },
          fontFamily: {
            display: ["Plus Jakarta Sans", "sans-serif"],
            serif: ["Playfair Display", "serif"]
          }
        }
      }
    };
  </script>
</head>

<body class="bg-background-light dark:bg-background-dark text-[#1a1c18] dark:text-white antialiased">
  <div
    class="relative min-h-screen w-full max-w-[390px] mx-auto flex flex-col bg-background-light dark:bg-background-dark overflow-x-hidden shadow-2xl">
    <header
      class="absolute top-0 left-0 right-0 z-20 flex items-center justify-between p-4 bg-gradient-to-b from-black/30 to-transparent">
      <button id="back-btn" onclick="history.back()"
        class="flex size-9 items-center justify-center rounded-full bg-white/25 backdrop-blur-md text-white shadow-sm active:scale-95">
        <span class="material-symbols-outlined text-[20px]">arrow_back</span>
      </button>
      <button id="favorite-btn"
        class="flex size-9 items-center justify-center rounded-full bg-white/25 backdrop-blur-md text-white shadow-sm active:scale-95">
        <span class="material-symbols-outlined text-[20px]">favorite</span>
      </button>
    </header>

    <div class="relative h-[320px] w-full overflow-hidden tea-cust-hero flex items-end justify-center pb-6 shrink-0">
      <div class="relative z-10 flex flex-col items-center text-center px-6">
        <h1 id="product-title" class="text-white text-[26px] font-extrabold tracking-tight leading-tight">Kyoto Matcha
          Latte</h1>
        <p class="text-white/85 text-[12px] font-medium mt-1">Stone-ground matcha with your choice of milk</p>
      </div>
    </div>

    <div class="relative -mt-8 flex-1 bg-background-light dark:bg-background-dark rounded-t-[20px] px-4 pt-6 pb-32 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
      <div class="flex flex-col gap-2 mb-6">
        <div class="flex justify-between items-start">
          <h1 class="font-serif italic font-bold text-[24px] text-gray-900 dark:text-white leading-tight">
            Ceremonial Matcha Latte
          </h1>
          <div class="bg-primary/10 text-primary px-2.5 py-0.5 rounded-full text-xs font-bold">
            <span id="total-price" class="align-middle">7.00DH</span>
          </div>
        </div>
        <div class="flex items-center gap-1.5 text-xs font-medium text-gray-600 dark:text-gray-400">
          <span class="material-symbols-outlined text-yellow-500 text-[16px]" style="font-variation-settings: 'FILL' 1">star</span>
          <span class="text-gray-900 dark:text-white font-bold text-sm">4.9</span>
          <span>(124 reviews)</span>
        </div>
        <p class="text-gray-500 dark:text-gray-400 text-xs leading-relaxed mt-1">
          Premium grade matcha whisked with water and your choice of milk. Smooth, earthy, and energizing.
        </p>
      </div>

      <div class="mb-6">
        <h3 class="text-gray-900 dark:text-white text-[20px] font-bold mb-3">Choose Size</h3>
        <div class="grid grid-cols-3 gap-3">
          <button
            class="group flex flex-col items-center justify-center gap-1.5 p-3 rounded-bento border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 hover:border-primary/50 transition relative overflow-hidden h-28 chip"
            data-size="small" data-price="6.00">
            <span
              class="material-symbols-outlined text-gray-400 dark:text-gray-500 text-2xl group-hover:text-primary transition">local_cafe</span>
            <div class="text-center">
              <span class="block text-[16px] font-semibold text-gray-900 dark:text-white">Small</span>
              <span class="block text-[10px] text-gray-500">8oz</span>
            </div>
          </button>
          <button
            class="group flex flex-col items-center justify-center gap-1.5 p-3 rounded-bento border-2 border-primary bg-primary/5 dark:bg-primary/10 transition relative overflow-hidden h-28 chip chip-active"
            data-size="medium" data-price="7.00">
            <div
              class="absolute top-2 right-2 w-4 h-4 bg-primary rounded-full flex items-center justify-center">
              <span class="material-symbols-outlined text-white text-[10px] font-bold">check</span>
            </div>
            <span class="material-symbols-outlined text-primary text-3xl">local_cafe</span>
            <div class="text-center">
              <span class="block text-[16px] font-semibold text-gray-900 dark:text-white">Medium</span>
              <span class="block text-[10px] text-primary font-medium">12oz</span>
            </div>
          </button>
          <button
            class="group flex flex-col items-center justify-center gap-1.5 p-3 rounded-bento border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 hover:border-primary/50 transition relative overflow-hidden h-28 chip"
            data-size="large" data-price="8.00">
            <span
              class="material-symbols-outlined text-gray-400 dark:text-gray-500 text-3xl group-hover:text-primary transition">local_cafe</span>
            <div class="text-center">
              <span class="block text-[16px] font-semibold text-gray-900 dark:text-white">Large</span>
              <span class="block text-[10px] text-gray-500">16oz</span>
            </div>
          </button>
        </div>
      </div>

      <div class="mb-6">
        <h3 class="text-gray-900 dark:text-white text-[20px] font-bold mb-3">Milk Base</h3>
        <div class="flex gap-3 overflow-x-auto no-scrollbar pb-1 -mx-4 px-4">
          <button
            class="flex-shrink-0 w-24 h-24 flex flex-col items-center justify-center gap-1 p-2 rounded-bento border-2 border-primary bg-primary/5 dark:bg-primary/10 transition chip chip-active"
            data-milk="whole" data-extra="0">
            <span class="material-symbols-outlined text-primary text-2xl">spa</span>
            <div class="text-center">
              <span class="block text-[16px] font-semibold text-gray-900 dark:text-white leading-tight">Whole</span>
              <span class="block text-[10px] text-primary font-medium">Included</span>
            </div>
          </button>
          <button
            class="flex-shrink-0 w-24 h-24 flex flex-col items-center justify-center gap-1 p-2 rounded-bento border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 hover:border-primary/50 transition chip"
            data-milk="skim" data-extra="0">
            <span class="material-symbols-outlined text-gray-400 dark:text-gray-500 text-2xl">nutrition</span>
            <div class="text-center">
              <span class="block text-[16px] font-semibold text-gray-900 dark:text-white leading-tight">Skim</span>
              <span class="block text-[10px] text-gray-500">Light</span>
            </div>
          </button>
          <button
            class="flex-shrink-0 w-24 h-24 flex flex-col items-center justify-center gap-1 p-2 rounded-bento border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 hover:border-primary/50 transition chip"
            data-milk="soy" data-extra="0.5">
            <span class="material-symbols-outlined text-gray-400 dark:text-gray-500 text-2xl">spa</span>
            <div class="text-center">
              <span class="block text-[16px] font-semibold text-gray-900 dark:text-white leading-tight">Soy</span>
              <span class="block text-[10px] text-primary font-medium">+0.50DH</span>
            </div>
          </button>
          <button
            class="flex-shrink-0 w-24 h-24 flex flex-col items-center justify-center gap-1 p-2 rounded-bento border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 hover:border-primary/50 transition chip"
            data-milk="almond" data-extra="0.7">
            <span class="material-symbols-outlined text-gray-400 dark:text-gray-500 text-2xl">spa</span>
            <div class="text-center">
              <span class="block text-[16px] font-semibold text-gray-900 dark:text-white leading-tight">Almond</span>
              <span class="block text-[10px] text-primary font-medium">+0.70DH</span>
            </div>
          </button>
          <button
            class="flex-shrink-0 w-24 h-24 flex flex-col items-center justify-center gap-1 p-2 rounded-bento border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 hover:border-primary/50 transition chip"
            data-milk="oat" data-extra="0.7">
            <span class="material-symbols-outlined text-gray-400 dark:text-gray-500 text-2xl">spa</span>
            <div class="text-center">
              <span class="block text-[16px] font-semibold text-gray-900 dark:text-white leading-tight">Oat</span>
              <span class="block text-[10px] text-primary font-medium">+0.70DH</span>
            </div>
          </button>
        </div>
      </div>

      <div class="mb-6">
        <h3 class="text-gray-900 dark:text-white text-[20px] font-bold mb-3">Sweetness</h3>
        <div class="grid grid-cols-4 gap-3">
          <button
            class="group flex flex-col items-center justify-center gap-1.5 p-3 rounded-bento border-2 border-primary bg-primary/5 dark:bg-primary/10 transition chip chip-active"
            data-sweet="0">
            <span class="block text-[14px] font-semibold text-gray-900 dark:text-white">0%</span>
          </button>
          <button
            class="group flex flex-col items-center justify-center gap-1.5 p-3 rounded-bento border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 hover:border-primary/50 transition chip"
            data-sweet="25">
            <span class="block text-[14px] font-semibold text-gray-900 dark:text-white">25%</span>
          </button>
          <button
            class="group flex flex-col items-center justify-center gap-1.5 p-3 rounded-bento border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 hover:border-primary/50 transition chip"
            data-sweet="50">
            <span class="block text-[14px] font-semibold text-gray-900 dark:text-white">50%</span>
          </button>
          <button
            class="group flex flex-col items-center justify-center gap-1.5 p-3 rounded-bento border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 hover:border-primary/50 transition chip"
            data-sweet="75">
            <span class="block text-[14px] font-semibold text-gray-900 dark:text-white">75%</span>
          </button>
        </div>
      </div>

      <div
        class="mt-4 w-full bg-white/95 dark:bg-[#1c130d]/95 backdrop-blur-xl border-t border-[#e8d9ce] dark:border-zinc-800 px-4 py-3 rounded-[20px]">
        <div class="flex items-center gap-4">
          <div
            class="flex items-center bg-background-light dark:bg-zinc-900 rounded-full px-2 h-12 border border-[#e8d9ce] dark:border-zinc-800">
            <button
              id="dec-qty"
              class="w-8 h-8 rounded-full flex items-center justify-center text-[#1c130d] dark:text-white hover:bg-zinc-200 dark:hover:bg-zinc-700">
              <span class="material-symbols-outlined text-lg">remove</span>
            </button>
            <span id="qty" class="w-6 text-center font-bold text-base">1</span>
            <button
              id="inc-qty"
              class="w-8 h-8 rounded-full flex items-center justify-center text-[#1c130d] dark:text-white hover:bg-zinc-200 dark:hover:bg-zinc-700">
              <span class="material-symbols-outlined text-lg">add</span>
            </button>
          </div>
          <button
            id="add-btn"
            class="flex-1 h-12 bg-primary hover:bg-primary/90 text-white rounded-full flex items-center justify-center gap-2 shadow-[0_8px_30px_rgb(244,123,37,0.3)] transition-transform active:scale-95">
            <span class="font-bold text-base tracking-wide uppercase">Add to Order</span>
            <span class="w-1 h-1 rounded-full bg-white/50"></span>
          </button>
        </div>
        <div class="flex items-center justify-between text-xs text-[#9c6c49] dark:text-zinc-400 px-1 mt-2">
          <span class="font-bold uppercase tracking-wide">Summary</span>
          <span id="summary-text" class="font-medium text-right">Medium • Whole • 50%</span>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
  <script src="../nav-bar.js?v=9"></script>
</body>

</html>
